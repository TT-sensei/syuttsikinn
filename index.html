<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>先生のための温かい出退勤管理</title>
  <style>
    :root {
      --primary-color: #f7a072;
      --bg-color: #fff9f5;
      --text-main: #5a4a42;
      --btn-off: #e0dcd9;
      --btn-on: #88d49e;
      --btn-done: #b8c2cc;
      --alert-yellow: #ffcf54;
      --alert-red: #ff7676;
      --alert-light-red: #ffe6e6;
    }
    
    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: var(--primary-color);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    h1 { margin: 0; font-size: 1.5rem; }
    
    .nav-btn {
      background: white;
      color: var(--primary-color);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
      padding-bottom: 50px;
    }

    /* ボード画面 */
    #board-view { display: block; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .name-tile {
      background-color: var(--btn-off);
      border: none;
      border-radius: 12px;
      padding: 15px 10px;
      font-size: 1rem;
      font-weight: bold;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      min-height: 80px;
    }

    .name-tile:active { transform: translateY(4px); box-shadow: none; }
    .name-tile.status-in { background-color: var(--btn-on); color: white; }
    .name-tile.status-done { background-color: var(--btn-done); color: white; }

    .edit-btn {
      position: absolute;
      bottom: 5px;
      left: 8px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.5;
      padding: 0;
    }
    .edit-btn:hover { opacity: 1; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }
    
    .page-btn {
      padding: 10px 20px;
      border: none;
      background-color: var(--primary-color);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
    }
    .page-btn:disabled { background-color: #ccc; cursor: not-allowed; }

    /* 管理画面 */
    #admin-view { display: none; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 0.95rem; }
    th { background-color: #fcece3; }
    .alert-yellow { background-color: var(--alert-yellow); }
    .alert-red { background-color: var(--alert-red); color: white;}
    .status-warning { background-color: var(--alert-light-red); font-weight: bold; color: #d32f2f;} 
    
    .admin-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .month-picker { padding: 8px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; }

    /* データ管理エリア */
    .data-management {
      margin-top: 40px;
      padding: 20px;
      background: #fdf5f1;
      border-radius: 12px;
      border: 1px solid #f7ceba;
    }
    .data-management h3 { margin-top: 0; color: var(--text-main); font-size: 1.2rem;}
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;}
    .file-label {
      display: inline-block;
      cursor: pointer;
      text-align: center;
    }
    .btn-dark { background-color: #5a4a42; }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .modal-content h2 { color: var(--primary-color); margin-top: 0; font-size: 1.3rem;}
    .modal-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      font-weight: bold;
    }
    .modal-btn-cancel { background: #ccc; margin-top: 10px; }

    .edit-form { text-align: left; margin-top: 15px; }
    .edit-form label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;}
    .edit-form input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
    .time-inputs { display: flex; gap: 10px; }
  </style>
</head>
<body>

  <header>
    <h1>🌸 学校出退勤ボード</h1>
    <button class="nav-btn" onclick="toggleView()">管理画面へ切り替え</button>
  </header>

  <div class="container">
    <div id="board-view">
      <div style="text-align: center; margin-bottom: 10px;">
        <h2 id="current-date-time"></h2>
        <p>名前をタップして打刻してください</p>
      </div>
      <div class="grid" id="teacher-grid"></div>
      <div class="pagination">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">前へ</button>
        <span id="page-indicator" style="line-height: 40px; font-weight: bold;"></span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">次へ</button>
      </div>
    </div>

    <div id="admin-view">
      <h2>📊 集計データ（管理者用）</h2>
      <div class="admin-controls">
        <div>
          <label for="admin-month" style="font-weight: bold;">表示月：</label>
          <input type="month" id="admin-month" class="month-picker" onchange="renderAdminTable()">
        </div>
        <button class="page-btn" onclick="exportSummaryCSV()">📥 月間集計(CSV)</button>
      </div>
      <table id="admin-table">
        <thead>
          <tr>
            <th>氏名</th>
            <th>基本勤務時間</th>
            <th>当月総労働時間</th>
            <th>当月残業合計</th>
            <th>本日の状態</th>
          </tr>
        </thead>
        <tbody id="admin-tbody"></tbody>
      </table>

      <div class="data-management">
        <h3>⚙️ データ入出力・バックアップ</h3>
        
        <p style="font-size: 0.9rem; margin-bottom: 5px;"><strong>【CSV操作】</strong> 日別詳細データの出力と、名簿の更新</p>
        <div class="btn-group">
          <button class="page-btn" onclick="exportDetailedCSV()">📥 日別詳細ログ(CSV)</button>
          <label class="page-btn file-label btn-dark">
            📤 名簿CSVの一括読込
            <input type="file" accept=".csv" onchange="importTeachersCSV(event)" style="display:none;">
          </label>
        </div>

        <p style="font-size: 0.9rem; margin-top: 15px; margin-bottom: 5px;"><strong>【JSON操作】</strong> 別タブレットへの移行・完全バックアップ</p>
        <div class="btn-group">
          <button class="page-btn" onclick="exportJSON()">📦 全データ保存(JSON)</button>
          <label class="page-btn file-label btn-dark">
            📦 全データ復元(JSON)
            <input type="file" accept=".json" onchange="importJSON(event)" style="display:none;">
          </label>
        </div>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="msg-modal">
    <div class="modal-content">
      <h2 id="msg-modal-title"></h2>
      <p id="msg-modal-message"></p>
      <button class="modal-btn" onclick="closeMsgModal()">閉じる</button>
    </div>
  </div>

  <div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
      <h2>✏️ 先生情報の編集</h2>
      <div class="edit-form">
        <input type="hidden" id="edit-id">
        <label>氏名</label>
        <input type="text" id="edit-name">
        <label>打刻データの修正（日付を選択）</label>
        <input type="date" id="edit-date" onchange="loadDateLogForEdit()">
        <div class="time-inputs">
          <div style="flex:1;"><label>出勤</label><input type="time" id="edit-in"></div>
          <div style="flex:1;"><label>退勤</label><input type="time" id="edit-out"></div>
        </div>
      </div>
      <button class="modal-btn" onclick="saveEdit()">保存する</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>

<script>
  const ITEMS_PER_PAGE = 50;
  let currentPage = 1;
  let teachers = JSON.parse(localStorage.getItem('app_teachers_v3'));
  let dailyLogs = JSON.parse(localStorage.getItem('app_logs_v3')) || {};

  if (!teachers) {
    teachers = [];
    const names = ["山田 太郎", "佐藤 花子", "鈴木 一郎", "高橋 結衣"];
    names.forEach((name, index) => {
      teachers.push({ id: index + 1, name: name, status: "out", standardStart: "08:15", standardEnd: "16:45", timeIn: null });
    });
    saveData();
  }

  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function saveData() {
    localStorage.setItem('app_teachers_v3', JSON.stringify(teachers));
    localStorage.setItem('app_logs_v3', JSON.stringify(dailyLogs));
  }

  function checkDateReset() {
    const todayStr = getTodayStr();
    const lastDate = localStorage.getItem('last_used_date_v3');
    if (lastDate && lastDate !== todayStr) {
      teachers.forEach(t => { t.status = "out"; t.timeIn = null; });
      saveData();
    }
    localStorage.setItem('last_used_date_v3', todayStr);
  }

  function timeToMinutes(timeStr) {
    if (!timeStr) return 0;
    const [h, m] = timeStr.split(":").map(Number);
    return h * 60 + m;
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('current-date-time').innerText = 
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function renderBoard() {
    const grid = document.getElementById('teacher-grid');
    grid.innerHTML = '';
    let displayTeachers = [...teachers].sort((a, b) => a.id - b.id);
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageTeachers = displayTeachers.slice(start, start + ITEMS_PER_PAGE);

    pageTeachers.forEach(t => {
      const tile = document.createElement('div');
      tile.className = `name-tile status-${t.status}`;
      
      let statusText = "";
      if (t.status === "in") {
        const time = new Date(t.timeIn);
        statusText = `<br><span style="font-size:0.85rem; font-weight:normal;">${time.getHours()}:${time.getMinutes().toString().padStart(2, '0')}〜勤務中</span>`;
      }
      if (t.status === "done") statusText = `<br><span style="font-size:0.85rem; font-weight:normal;">退勤済</span>`;
      
      const punchArea = document.createElement('div');
      punchArea.innerHTML = `${t.name} ${statusText}`;
      punchArea.onclick = () => handlePunch(t.id);
      
      const editBtn = document.createElement('button');
      editBtn.className = 'edit-btn';
      editBtn.innerHTML = '✏️';
      editBtn.onclick = (e) => { e.stopPropagation(); openEditModal(t.id); };

      tile.appendChild(punchArea);
      tile.appendChild(editBtn);
      grid.appendChild(tile);
    });

    const totalPages = Math.ceil(teachers.length / ITEMS_PER_PAGE);
    document.getElementById('page-indicator').innerText = totalPages > 0 ? `${currentPage} / ${totalPages}` : "1 / 1";
    document.getElementById('prev-btn').disabled = currentPage === 1;
    document.getElementById('next-btn').disabled = currentPage === totalPages || totalPages === 0;
  }

  function changePage(delta) { currentPage += delta; renderBoard(); }

  function saveDailyLog(dateStr, teacherId, inTimeStr, outTimeStr) {
    if (!dailyLogs[dateStr]) dailyLogs[dateStr] = {};
    const t = teachers.find(x => x.id == teacherId);
    let workHours = 0, overtime = 0;

    if (inTimeStr && outTimeStr) {
      const inMin = timeToMinutes(inTimeStr);
      let outMin = timeToMinutes(outTimeStr);
      if (outMin < inMin) outMin += 24 * 60; 
      workHours = (outMin - inMin) / 60;
      const stdHours = (timeToMinutes(t.standardEnd) - timeToMinutes(t.standardStart)) / 60;
      overtime = Math.max(0, workHours - stdHours);
    }
    dailyLogs[dateStr][teacherId] = { in: inTimeStr, out: outTimeStr, work: workHours, over: overtime };
  }

  function getHHMM(timestamp) {
    const d = new Date(timestamp);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function handlePunch(id) {
    const teacher = teachers.find(t => t.id === id);
    const todayStr = getTodayStr();
    
    if (teacher.status === "done") {
      if (!confirm(`${teacher.name}先生、退勤を取り消して勤務中に戻しますか？`)) return;
      teacher.status = "in";
      teacher.timeIn = new Date().getTime();
      saveDailyLog(todayStr, id, getHHMM(teacher.timeIn), "");
    } else if (teacher.status === "out") {
      teacher.status = "in";
      teacher.timeIn = new Date().getTime();
      saveDailyLog(todayStr, id, getHHMM(teacher.timeIn), "");
      showMsgModal(`${teacher.name}先生、おはようございます！`, "今日も1日よろしくお願いします！");
    } else if (teacher.status === "in") {
      if (!confirm(`${teacher.name}先生、退勤しますか？`)) return;
      teacher.status = "done";
      saveDailyLog(todayStr, id, getHHMM(teacher.timeIn), getHHMM(new Date().getTime()));
      
      const monthPrefix = todayStr.substring(0, 7);
      let monthOvertime = 0;
      for (let d in dailyLogs) {
        if (d.startsWith(monthPrefix) && dailyLogs[d][id]) monthOvertime += dailyLogs[d][id].over || 0;
      }

      let msg = `本日の実働は ${dailyLogs[todayStr][id].work.toFixed(2)} 時間でした。`;
      let title = monthOvertime > 45 ? "⚠️ 超過警告" : (monthOvertime > 30 ? "💡 注意" : "お疲れ様でした！");
      if(monthOvertime > 30) msg += `<br><br>今月の残業が <strong style="color:red;">${monthOvertime.toFixed(1)} 時間</strong> です。`;
      showMsgModal(`${teacher.name}先生、${title}`, msg);
    }
    
    saveData(); renderBoard(); if(isAdmin) renderAdminTable();
  }

  function openEditModal(id) {
    const t = teachers.find(x => x.id === id);
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = t.name;
    document.getElementById('edit-date').value = getTodayStr();
    loadDateLogForEdit();
    document.getElementById('edit-modal').style.display = 'flex';
  }
  function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
  function loadDateLogForEdit() {
    const id = document.getElementById('edit-id').value;
    const date = document.getElementById('edit-date').value;
    const log = (dailyLogs[date] && dailyLogs[date][id]) ? dailyLogs[date][id] : null;
    document.getElementById('edit-in').value = log ? log.in : "";
    document.getElementById('edit-out').value = log ? log.out : "";
  }
  function saveEdit() {
    const id = parseInt(document.getElementById('edit-id').value);
    const dateStr = document.getElementById('edit-date').value;
    const inTime = document.getElementById('edit-in').value;
    const outTime = document.getElementById('edit-out').value;
    
    const teacher = teachers.find(t => t.id === id);
    teacher.name = document.getElementById('edit-name').value.trim();
    saveDailyLog(dateStr, id, inTime, outTime);

    if (dateStr === getTodayStr()) {
      if (inTime && !outTime) { teacher.status = "in"; teacher.timeIn = new Date(`${dateStr}T${inTime}:00`).getTime(); } 
      else if (inTime && outTime) { teacher.status = "done"; } 
      else { teacher.status = "out"; teacher.timeIn = null; }
    }
    saveData(); renderBoard(); if(isAdmin) renderAdminTable(); closeEditModal();
  }

  function showMsgModal(title, message) {
    document.getElementById('msg-modal-title').innerText = title;
    document.getElementById('msg-modal-message').innerHTML = message;
    document.getElementById('msg-modal').style.display = 'flex';
  }
  function closeMsgModal() { document.getElementById('msg-modal').style.display = 'none'; }

  let isAdmin = false;
  function toggleView() {
    isAdmin = !isAdmin;
    document.getElementById('board-view').style.display = isAdmin ? 'none' : 'block';
    document.getElementById('admin-view').style.display = isAdmin ? 'block' : 'none';
    document.querySelector('.nav-btn').innerText = isAdmin ? '打刻画面に戻る' : '管理画面へ切り替え';
    if (isAdmin) {
      document.getElementById('admin-month').value = getTodayStr().substring(0, 7);
      renderAdminTable();
    }
  }

  function renderAdminTable() {
    const tbody = document.getElementById('admin-tbody');
    tbody.innerHTML = '';
    const targetMonth = document.getElementById('admin-month').value;
    if (!targetMonth) return;

    [...teachers].sort((a, b) => a.id - b.id).forEach(t => {
      let mTotal = 0, mOver = 0;
      for (let d in dailyLogs) {
        if (d.startsWith(targetMonth) && dailyLogs[d][t.id]) {
          mTotal += dailyLogs[d][t.id].work || 0;
          mOver += dailyLogs[d][t.id].over || 0;
        }
      }
      
      let state = t.status === "in" ? "⚠️未退勤" : (t.status === "done" ? "退勤済" : "未出勤");
      let trClass = mOver > 45 ? "alert-red" : (mOver > 30 ? "alert-yellow" : "");
      if(t.status === "in") trClass = "status-warning";

      tbody.innerHTML += `
        <tr class="${trClass}">
          <td>${t.name}</td>
          <td>${t.standardStart}〜${t.standardEnd}</td>
          <td>${mTotal.toFixed(2)} h</td>
          <td>${mOver.toFixed(2)} h</td>
          <td>${state}</td>
        </tr>
      `;
    });
  }

  // ==========================================
  // 新機能：データ入出力 (CSV / JSON)
  // ==========================================

  // 1. ダウンロード用ヘルパー関数
  function downloadFile(content, fileName, mimeType) {
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), content], { type: mimeType }); // BOM付きで文字化け防止
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
  }

  // 2. CSV出力：月間集計（既存のものをヘルパー利用に整理）
  function exportSummaryCSV() {
    const month = document.getElementById('admin-month').value;
    if (!month) return;
    let csv = `氏名,基本開始,基本終了,${month}労働時間,${month}残業時間\n`;
    [...teachers].sort((a,b)=>a.id-b.id).forEach(t => {
      let mTotal = 0, mOver = 0;
      for (let d in dailyLogs) {
        if (d.startsWith(month) && dailyLogs[d][t.id]) {
          mTotal += dailyLogs[d][t.id].work || 0; mOver += dailyLogs[d][t.id].over || 0;
        }
      }
      csv += `${t.name},${t.standardStart},${t.standardEnd},${mTotal.toFixed(2)},${mOver.toFixed(2)}\n`;
    });
    downloadFile(csv, `Summary_${month}.csv`, 'text/csv;charset=utf-8;');
  }

  // 3. CSV出力：日別詳細ログ
  function exportDetailedCSV() {
    const month = document.getElementById('admin-month').value;
    if (!month) return;
    let csv = `日付,教員ID,氏名,出勤時間,退勤時間,実働時間,残業時間\n`;
    
    // 日付順にソートして出力
    Object.keys(dailyLogs).sort().forEach(date => {
      if(date.startsWith(month)) {
        Object.keys(dailyLogs[date]).forEach(teacherId => {
          const t = teachers.find(x => x.id == teacherId);
          const log = dailyLogs[date][teacherId];
          const name = t ? t.name : "削除済ユーザー";
          csv += `${date},${teacherId},${name},${log.in||""},${log.out||""},${log.work.toFixed(2)},${log.over.toFixed(2)}\n`;
        });
      }
    });
    downloadFile(csv, `DailyLogs_${month}.csv`, 'text/csv;charset=utf-8;');
  }

  // 4. CSV読込：教員名簿の一括更新
  // 想定フォーマット: id,name,standardStart,standardEnd
  function importTeachersCSV(event) {
    const file = event.target.files[0];
    if(!file) return;
    if(!confirm("CSVから名簿を上書き登録しますか？\n（IDが一致する先生は情報が上書きされます）")) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.split('\n');
      let updatedCount = 0;
      
      for(let i=1; i<lines.length; i++) { // 1行目はヘッダ想定でスキップ
        if(!lines[i].trim()) continue;
        const [idStr, name, start, end] = lines[i].split(',');
        const id = parseInt(idStr);
        if(!id || !name) continue;

        let existing = teachers.find(t => t.id === id);
        if(existing) {
          existing.name = name.trim();
          if(start) existing.standardStart = start.trim();
          if(end) existing.standardEnd = end.trim();
        } else {
          teachers.push({
            id: id, name: name.trim(), status: "out", 
            standardStart: start ? start.trim() : "08:15", 
            standardEnd: end ? end.trim() : "16:45", timeIn: null
          });
        }
        updatedCount++;
      }
      saveData();
      renderBoard();
      renderAdminTable();
      alert(`${updatedCount}名の教員データを読み込みました！`);
    };
    reader.readAsText(file); // UTF-8想定
    event.target.value = ""; // リセット
  }

  // 5. JSONバックアップ：全データ保存
  function exportJSON() {
    const backupData = {
      exportedAt: new Date().toISOString(),
      teachers: teachers,
      dailyLogs: dailyLogs
    };
    const jsonStr = JSON.stringify(backupData, null, 2);
    downloadFile(jsonStr, `Attendance_Backup_${getTodayStr()}.json`, 'application/json');
  }

  // 6. JSON復元：全データ上書き
  function importJSON(event) {
    const file = event.target.files[0];
    if(!file) return;
    if(!confirm("🚨 警告 🚨\n現在のすべてのデータが消去され、選択したファイルの内容で完全に上書きされます。\n本当によろしいですか？")) {
      event.target.value = ""; return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if(data.teachers && data.dailyLogs) {
          teachers = data.teachers;
          dailyLogs = data.dailyLogs;
          saveData();
          renderBoard();
          renderAdminTable();
          alert("✅ データの復元が完了しました！");
        } else {
          alert("❌ 正しいバックアップファイルではありません。");
        }
      } catch(err) {
        alert("❌ ファイルの読み込みに失敗しました。ファイルが破損している可能性があります。");
      }
      event.target.value = ""; // リセット
    };
    reader.readAsText(file);
  }

  // 起動時
  checkDateReset();  
  renderBoard();
</script>
</body>
</html>
